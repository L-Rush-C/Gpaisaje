general{
    gaps_in = 10
    gaps_out = 10

    border_size = 2

    col.active_border = rgba(227,228,194,1.0)
    col.inactive_border = rgba(147,147,113,1.0)
    }

decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 1

        vibrancy = 0.1696
    }
}